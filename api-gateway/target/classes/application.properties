# ═══════════════════════════════════════════════════════════════════════════════
#  API Gateway – application.properties
# ═══════════════════════════════════════════════════════════════════════════════

server.port=3000
spring.application.name=api-gateway

# ── Spring Cloud Config is NOT used by the gateway (local properties only) ───
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

# ═══════════════════════════════════════════════════════════════════════════════
#  Eureka
# ═══════════════════════════════════════════════════════════════════════════════
eureka.client.restclient.enabled=true

eureka.client.service-url.defaultZone=http://localhost:3761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.registry-fetch-interval-seconds=5
eureka.client.initial-instance-info-replication-interval-seconds=5
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30

# ═══════════════════════════════════════════════════════════════════════════════
#  Gateway Routes  (API traffic only – NO swagger doc routes)
#
#  Swagger /*/v3/api-docs requests are handled by SwaggerAggregatorController
#  (@GetMapping with exact paths) which fetches each service directly.
#  That approach is more reliable than Path predicate routing for non-wildcard
#  paths in Spring Cloud Gateway MVC / Spring Cloud 2024.x.
# ═══════════════════════════════════════════════════════════════════════════════

# ── Identity Service (port 3001) ──────────────────────────────────────────────
spring.cloud.gateway.mvc.routes[0].id=identity-service
spring.cloud.gateway.mvc.routes[0].uri=http://localhost:3001
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/identity/**
spring.cloud.gateway.mvc.routes[0].filters[0]=StripPrefix=1

# ── Catalog Service (port 3002) ───────────────────────────────────────────────
spring.cloud.gateway.mvc.routes[1].id=catalog-service
spring.cloud.gateway.mvc.routes[1].uri=http://localhost:3002
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/catalog/**
spring.cloud.gateway.mvc.routes[1].filters[0]=StripPrefix=1

# ── Enrollment Service (port 3003) ────────────────────────────────────────────
spring.cloud.gateway.mvc.routes[2].id=enrollment-service
spring.cloud.gateway.mvc.routes[2].uri=http://localhost:3003
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/enrollment/**
spring.cloud.gateway.mvc.routes[2].filters[0]=StripPrefix=1

# ── Assessment Service (port 3004) ────────────────────────────────────────────
spring.cloud.gateway.mvc.routes[3].id=assessment-service
spring.cloud.gateway.mvc.routes[3].uri=http://localhost:3004
spring.cloud.gateway.mvc.routes[3].predicates[0]=Path=/assessment/**
spring.cloud.gateway.mvc.routes[3].filters[0]=StripPrefix=1

# ── Communication Service (port 3005) ─────────────────────────────────────────
spring.cloud.gateway.mvc.routes[4].id=communication-service
spring.cloud.gateway.mvc.routes[4].uri=http://localhost:3005
spring.cloud.gateway.mvc.routes[4].predicates[0]=Path=/communication/**
spring.cloud.gateway.mvc.routes[4].filters[0]=StripPrefix=1

# ═══════════════════════════════════════════════════════════════════════════════
#  JWT
# ═══════════════════════════════════════════════════════════════════════════════
jwt.secret=university-training-portal-jwt-secret-key-2026-must-be-at-least-256-bits

# ═══════════════════════════════════════════════════════════════════════════════
#  Springdoc – Aggregated Swagger UI for all microservices
#
#  Swagger UI:  http://localhost:3000/swagger-ui.html
#  Each service's spec is proxied (with server-URL rewrite) by
#  SwaggerProxyController at GET /v3/api-docs/{service}.
#
#  The UI shows a dropdown — select a service to view & try its endpoints.
#  All "Try it out" requests are routed through the gateway prefix, e.g.:
#    /identity/auth/login  →  identity-service:3001/auth/login
# ═══════════════════════════════════════════════════════════════════════════════
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.disable-swagger-default-url=true

# ── Per-service specs (SwaggerProxyController serves these) ──────────────────
springdoc.swagger-ui.urls[0].name=Identity Service
springdoc.swagger-ui.urls[0].url=/v3/api-docs/identity
springdoc.swagger-ui.urls[1].name=Catalog Service
springdoc.swagger-ui.urls[1].url=/v3/api-docs/catalog
springdoc.swagger-ui.urls[2].name=Enrollment Service
springdoc.swagger-ui.urls[2].url=/v3/api-docs/enrollment
springdoc.swagger-ui.urls[3].name=Assessment Service
springdoc.swagger-ui.urls[3].url=/v3/api-docs/assessment
springdoc.swagger-ui.urls[4].name=Communication Service
springdoc.swagger-ui.urls[4].url=/v3/api-docs/communication

# Default service shown when Swagger UI first loads
springdoc.swagger-ui.urls-primary-name=Identity Service

# Keep the Authorize button's token across service switches in the UI
springdoc.swagger-ui.persist-authorization=true

# ═══════════════════════════════════════════════════════════════════════════════
#  Actuator
# ═══════════════════════════════════════════════════════════════════════════════
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=API Gateway
info.app.version=1.0.0

# ═══════════════════════════════════════════════════════════════════════════════
#  Logging
# ═══════════════════════════════════════════════════════════════════════════════
logging.level.com.university.gateway=DEBUG
logging.level.org.springframework.cloud.gateway=INFO
logging.level.com.netflix.discovery=DEBUG
logging.level.com.netflix.eureka=DEBUG
